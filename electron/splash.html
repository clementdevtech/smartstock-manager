<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartStock POS - Loading</title>

<style>
:root{
  --bg:#0f1115;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.10);
  --text:rgba(255,255,255,0.92);
  --muted:rgba(255,255,255,0.65);
  --accent:#22c55e;
  --accent2:#38bdf8;
}

*{box-sizing:border-box}

html,body{
  width:100%;height:100%;margin:0;padding:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:
  radial-gradient(circle at 20% 20%,rgba(34,197,94,.14),transparent 35%),
  radial-gradient(circle at 80% 30%,rgba(56,189,248,.14),transparent 40%),
  radial-gradient(circle at 40% 90%,rgba(255,255,255,.06),transparent 40%),
  var(--bg);
  color:var(--text);
  overflow:hidden;
}

.wrap{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  padding:18px;
}

.card{
  width:440px;max-width:95vw;
  border-radius:18px;
  background:var(--card);
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,.55);
  padding:18px 18px 16px;
  backdrop-filter:blur(10px);
}

.top{display:flex;gap:12px;align-items:center;margin-bottom:14px}

.logo{
  width:52px;height:52px;border-radius:14px;
  background:url("./icons/logo.png") center/cover no-repeat;
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 10px 20px rgba(0,0,0,.35);
}

.title h1{margin:0;font-size:18px;font-weight:700}
.title p{margin:3px 0 0;font-size:13px;color:var(--muted)}

.row{display:flex;justify-content:space-between;margin:10px 0 8px}

.status{font-size:13px;font-weight:600}
.eta{font-size:12px;color:var(--muted)}

.progressBar{
  width:100%;height:10px;border-radius:999px;
  background:rgba(255,255,255,.08);
  overflow:hidden;
  border:1px solid rgba(255,255,255,.10);
}

.progressFill{
  width:6%;height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .35s ease;
}

.logs{
  margin-top:14px;border-radius:14px;
  background:rgba(0,0,0,.22);
  border:1px solid rgba(255,255,255,.08);
  padding:10px;height:120px;overflow:hidden;
}

.logs pre{
  margin:0;font-size:11.5px;line-height:1.35;
  color:rgba(255,255,255,.80);
  white-space:pre-wrap;
}

.ad{
  margin-top:12px;padding:10px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.04);
  cursor:pointer;
  transition:all .2s ease;
}
.ad:hover{background:rgba(255,255,255,.08)}

.ad .big{font-size:13px;font-weight:700;margin:0 0 4px}
.ad .small{font-size:12px;margin:0;color:var(--muted)}

.footer{
  margin-top:10px;
  display:flex;justify-content:space-between;
  font-size:11px;color:rgba(255,255,255,.45);
}

.spinner{
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(255,255,255,.18);
  border-top-color:rgba(255,255,255,.85);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

<div class="top">
<div class="logo"></div>
<div class="title">
<h1>SmartStock POS</h1>
<p>Starting system services… please wait</p>
</div>
<div class="spinner"></div>
</div>

<div class="row">
<div class="status" id="statusText">Booting…</div>
<div class="eta" id="etaText">Preparing…</div>
</div>

<div class="progressBar">
<div class="progressFill" id="progressFill"></div>
</div>

<div class="logs">
<pre id="logBox">Preparing startup…</pre>
</div>

<div class="ad" id="adBox">
<p class="big" id="adTitle"></p>
<p class="small" id="adText"></p>
</div>

<div class="footer">
<span id="versionText">v1.0.0</span>
<span>SmartStock POS • Offline-first</span>
</div>

</div>
</div>

<script>
const logBox=document.getElementById("logBox");
const statusText=document.getElementById("statusText");
const etaText=document.getElementById("etaText");
const progressFill=document.getElementById("progressFill");
const versionText=document.getElementById("versionText");

let lastLines=[];
const MAX_LINES=10;

const MIN_VISIBLE_MS=3*60*1000;
const MAX_VISIBLE_MS=5*60*1000;
const startedAt=Date.now();

let realMessagesStarted=false;
let appReadySignalReceived=false;

const idleLogs=[
"Initializing offline storage…",
"Loading product engine…",
"Starting local services…",
"Optimizing database…",
"Preparing cashier module…",
"Preparing inventory module…",
"Loading receipts & printer support…",
"Starting secure API layer…",
"Checking system permissions…",
"Finalizing startup…"
];

function appendLog(line){
const time=new Date().toLocaleTimeString();
lastLines.push(`[${time}] ${line}`);
if(lastLines.length>MAX_LINES)lastLines.shift();
logBox.textContent=lastLines.join("\n");
}

function setStatus(payload={}){
if(payload.status)statusText.textContent=payload.status;
if(typeof payload.progress==="number"){
const pct=Math.max(0,Math.min(100,payload.progress));
progressFill.style.width=pct+"%";
}
if(payload.log)appendLog(payload.log);
if(payload.version)versionText.textContent=payload.version;
}

function computeProgress(){
const elapsed=Date.now()-startedAt;
if(elapsed<=MIN_VISIBLE_MS){
return 6+(elapsed/MIN_VISIBLE_MS)*64;
}else{
const t=Math.min(1,(elapsed-MIN_VISIBLE_MS)/(MAX_VISIBLE_MS-MIN_VISIBLE_MS));
return 70+t*25;
}
}

function tryFinish(){
const elapsed=Date.now()-startedAt;
if(appReadySignalReceived && elapsed>=MIN_VISIBLE_MS){
window.postMessage({type:"SPLASH_MIN_DONE"},"*");
}
if(elapsed>=MAX_VISIBLE_MS){
window.postMessage({type:"SPLASH_FORCE_DONE"},"*");
}
}

setInterval(()=>{
const progress=computeProgress();
if(!realMessagesStarted){
setStatus({status:"Starting SmartStock services…",progress});
}
if(Math.random()<0.18){
appendLog(idleLogs[Math.floor(Math.random()*idleLogs.length)]);
}
const remaining=Math.max(0,MAX_VISIBLE_MS-(Date.now()-startedAt));
etaText.textContent=`Finishing in ${Math.ceil(remaining/1000)}s max`;
tryFinish();
},1200);

window.addEventListener("message",(event)=>{
if(event?.data?.type==="SPLASH_STATUS"){
realMessagesStarted=true;
const payload=event.data.payload||{};
if(payload.ready===true){
appReadySignalReceived=true;
appendLog("✅ App signaled ready — waiting minimum time…");
}
setStatus({
...payload,
progress:typeof payload.progress==="number"?payload.progress:computeProgress()
});
}
});

appendLog("Boot sequence started…");
appendLog("Checking system environment…");

/* ===== ROTATING ADS ===== */
const ads=[
{
title:"🚀 Powered by netsafehub",
text:"Need a POS, Website or Mobile App? We build secure systems.",
link:"https://netsafehub.com"
},
{
title:"📱 Custom Business Apps",
text:"Android & iOS solutions for African businesses.",
link:"https://netsafehub.com"
},
{
title:"🌍 Professional Websites",
text:"Modern websites that convert customers.",
link:"https://netsafehub.com"
}
];

let adIndex=0;
const adBox=document.getElementById("adBox");
const adTitle=document.getElementById("adTitle");
const adText=document.getElementById("adText");

function showAd(){
const ad=ads[adIndex];
adTitle.textContent=ad.title;
adText.textContent=ad.text;
adBox.onclick=()=>window.postMessage({type:"OPEN_EXTERNAL",url:ad.link},"*");
adIndex=(adIndex+1)%ads.length;
}

setInterval(showAd,15000);
showAd();
</script>
</body>
</html>
